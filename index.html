<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Red Light Affair | M.A.D. Haus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
     * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
    min-height: 100vh;
    background:
      radial-gradient(circle at top, rgba(255,90,120,0.35), transparent 55%),
      radial-gradient(circle at bottom, rgba(180,0,0,0.55), #050005 80%),
      linear-gradient(135deg, #120006 0%, #2d0007 40%, #050005 100%);
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
   /* NEW: scale wrapper */
  .scale-wrap {
    transform: scale(1.5);         /* 50% bigger */
    transform-origin: center center;
  }
    .glow-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 0%, rgba(255,0,80,0.18), transparent 55%),
      radial-gradient(circle at 80% 100%, rgba(255,70,0,0.22), transparent 55%);
    mix-blend-mode: screen;
    opacity: 0.9;
  }
    .card {
    position: relative;
    max-width: 480px;
    width: 100%;
    border-radius: 24px;
    padding: 24px 20px 28px;
    background: rgba(8,0,6,0.86);
    box-shadow:
      0 0 30px rgba(255,0,80,0.25),
      0 20px 60px rgba(0,0,0,0.9);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,90,140,0.35);
    overflow: hidden;
  }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,120,160,0.12), transparent 55%),
        linear-gradient(to bottom, rgba(255,0,60,0.12), transparent 40%);
      opacity: 0.9;
      pointer-events: none;
    }
    header {
      position: relative;
      text-align: center;
      margin-bottom: 18px;
      z-index: 1;
    }
    .tagline {
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,180,210,0.88);
      margin-bottom: 4px;
    }
    h1 {
      font-size: 2rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: #ff4a5f;
      text-shadow:
        0 0 12px rgba(255,40,80,0.9),
        0 0 30px rgba(255,0,40,0.7);
    }
    h2 {
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,230,235,0.92);
      margin-bottom: 8px;
    }
    .subline {
      font-size: 0.8rem;
      color: rgba(255,210,220,0.85);
    }
    .poster-wrap {
      position: relative;
      margin: 16px 0 20px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,120,160,0.4);
      box-shadow:
        0 0 24px rgba(255,30,70,0.7),
        0 18px 36px rgba(0,0,0,0.85);
    }
    .poster-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(5,0,4,0.75);
      border: 1px solid rgba(255,130,170,0.8);
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,230,240,0.96);
      backdrop-filter: blur(10px);
    }
    .cta {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .cta p {
      font-size: 0.8rem;
      color: rgba(255,210,220,0.9);
      margin-bottom: 10px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff3b6a 0%, #ff7a3c 40%, #5c0017 100%);
      border: none;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      box-shadow:
        0 0 18px rgba(255,60,110,0.9),
        0 12px 28px rgba(0,0,0,0.9);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }
    .btn span.icon {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(255,255,255,0.9);
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 0 24px rgba(255,80,130,1),
        0 18px 32px rgba(0,0,0,0.95);
      filter: brightness(1.05);
    }
    .btn:active {
      transform: translateY(0) scale(0.99);
      box-shadow:
        0 0 12px rgba(255,60,110,0.7),
        0 10px 18px rgba(0,0,0,0.9);
    }
    footer {
      position: relative;
      margin-top: 14px;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255,190,210,0.75);
      z-index: 1;
    }
    footer span {
      opacity: 0.9;
    }
    @media (min-width: 720px) {
      body { padding: 60px 24px; }
      .card { padding: 28px 24px 30px; }
      h1 { font-size: 2.3rem; }
      h2 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
   <div class="glow-overlay" aria-hidden="true"></div>
<div class="scale-wrap">
    <main class="card">
  <main class="card">
    <header>
      <div class="tagline">M.A.D. Haus Presents</div>
      <h1>Red Light Affair</h1>
      <h2>Brooklyn · NY</h2>
      <p class="subline">Where fantasies ignite and passions flow.</p>
    </header>

    <section class="poster-wrap" aria-label="Event poster">
      <div class="badge">One Night Only</div>
      <!-- Replace poster.jpg with your flyer path -->
      <img src="poster.jpg" alt="Red Light Affair event flyer" />
    </section>

    <section class="cta">
      <p>Tap below to lock in your spot and get ticket details sent instantly.</p>
      <!-- Replace # with your real ticket link -->
      <a class="btn" href="#" target="_blank" rel="noopener">
        <span class="icon"></span>
        <span>Purchase Tickets</span>
      </a>
    </section>

    <footer>
      <span>M.A.D. Haus is discreet, curated, and unapologetically wild.</span>
    </footer>
  </main>
</body>
</html>
